name: Android GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Expo project
        run: bunx expo-doctor

      - name: Generate Android project
        run: bunx expo prebuild --platform android --clean --non-interactive

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew app:assembleRelease -x lint -x test --build-cache

      - name: Prepare release asset
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk "release/fandom-and-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          generate_release_notes: true
